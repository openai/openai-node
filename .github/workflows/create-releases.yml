name: Create releases
on:
  push:
    branches:
      - main

env:
  LATEST_LTS_NODE_VERSION: '24'

jobs:
  release:
    name: release
    if: github.ref == 'refs/heads/main' && github.repository == 'openai/openai-node'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: stainless-api/trigger-release-please@bb6677c5a04578eec1ccfd9e1913b5b78ed64c61 # v1.4.0
        id: release
        with:
          repo: ${{ github.event.repository.full_name }}
          stainless-api-key: ${{ secrets.STAINLESS_API_KEY }}

      - name: Set up pnpm
        if: ${{ steps.release.outputs.releases_created }}
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node
        if: ${{ steps.release.outputs.releases_created }}
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ env.LATEST_LTS_NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          pnpm install --frozen-lockfile

      - name: Publish to NPM
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          bash ./bin/publish-npm

      - name: Publish to JSR
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          bash ./bin/publish-jsr
