name: CI
on:
  pull_request:
    branches:
      - main
      - next

jobs:
  detect_breaking_changes:
    runs-on: 'ubuntu-latest'
    name: detect-breaking-changes
    if: github.repository == 'openai/openai-node'
    steps:
      - name: Calculate fetch-depth
        run: |
          echo "FETCH_DEPTH=$(expr ${{ github.event.pull_request.commits }} + 1)" >> $GITHUB_ENV

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Ensure we can check out the pull request base in the script below.
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          ./scripts/bootstrap

      - name: Detect breaking changes
        run: |
          # Try to check out previous versions of the breaking change detection script. This ensures that
          # we still detect breaking changes when entire files and their tests are removed.
          git checkout "${{ github.event.pull_request.base.sha }}" -- ./scripts/detect-breaking-changes 2>/dev/null || true
          ./scripts/detect-breaking-changes ${{ github.event.pull_request.base.sha }}
  agents_sdk:
    runs-on: 'ubuntu-latest'
    name: Detect Agents SDK regressions
    if: github.repository == 'openai/openai-node'
    steps:
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      # Setup this sdk
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: openai-node

      - name: Bootstrap
        working-directory: openai-node
        run: ./scripts/bootstrap

      - name: Build
        working-directory: openai-node
        run: ./scripts/build

      # Setup the agents packages
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: openai/openai-agents-js
          path: openai-agents-js

      - name: Link agents packages to local SDKs
        working-directory: openai-agents-js
        run: corepack pnpm --filter @openai/agents-core --filter @openai/agents-openai --filter @openai/agents add file:../../../openai-node/dist

      - name: Install dependencies
        working-directory: openai-agents-js
        run: corepack pnpm install --frozen-lockfile

      - name: Build all packages
        working-directory: openai-agents-js
        run: corepack pnpm build

      - name: Run linter
        working-directory: openai-agents-js
        run: corepack pnpm lint

      - name: Type-check docs scripts
        working-directory: openai-agents-js
        run: corepack pnpm docs:scripts:check
