<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Speaking Gym" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <title>Spanish Speaking Gym</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Spanish Speaking Gym</h1>
      <p>Speak first. Practice daily. Keep it simple.</p>
    </header>

    <nav class="nav" aria-label="Main navigation">
      <button data-route="/" class="active">Today</button>
      <button data-route="/phrases">Phrases</button>
      <button data-route="/drills">Drills</button>
      <button data-route="/roleplays">Roleplays</button>
      <button data-route="/weak-phrases">Weak Phrases</button>
      <button data-route="/progress">Progress</button>
      <button data-route="/settings">Settings</button>
    </nav>

    <main id="app" class="app" aria-live="polite"></main>

    <template id="card-template">
      <article class="card"></article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
